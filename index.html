<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3A2210">
<title>ספר המתכונים שלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7EDD8;
    --cream: #FFF9EE;
    --border: #C8A87A;
    --brown: #5C3D1E;
    --dark: #3A2210;
    --gold: #8B6914;
    --text: #2C1A0E;
    --muted: #7A5C3A;
    --light: #E8D5B0;
    --red: #8B3A3A;
    --ff: 'Playfair Display', Georgia, serif;
    --fb: 'Lora', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--dark); overflow: hidden; }
  body { font-family: var(--fb); }

  #app {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
    position: relative;
  }

  /* ── Scrollable content area ── */
  .page { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .page.active { display: flex; }
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* ── Typography ── */
  .ff { font-family: var(--ff); }
  .fb { font-family: var(--fb); }

  /* ── Header ── */
  .hdr {
    background: linear-gradient(168deg, var(--dark) 0%, var(--brown) 65%, #7A4A2A 100%);
    padding: 18px 18px 14px;
    text-align: center;
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 6px 28px rgba(0,0,0,0.38);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hdr::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 25% 15%, rgba(139,105,20,0.22) 0%, transparent 55%);
    pointer-events: none;
  }
  .hdr-orn { color: var(--gold); font-size: 11px; letter-spacing: 12px; opacity: 0.75; margin-bottom: 5px; }
  .hdr-title { font-family: var(--ff); font-size: 26px; font-weight: 900; color: #FFF9EE; letter-spacing: 2px; text-shadow: 2px 3px 8px rgba(0,0,0,0.5); line-height: 1.1; }
  .hdr-sub { font-size: 9px; color: #C4A882; letter-spacing: 6px; margin-top: 4px; font-style: italic; opacity: 0.9; }
  .hdr-count { font-size: 11px; color: var(--gold); margin-top: 6px; opacity: 0.85; }

  /* ── Nav bar ── */
  .nav { display: flex; background: var(--dark); border-bottom: 2px solid var(--gold); flex-shrink: 0; }
  .nav-btn {
    flex: 1; padding: 11px 4px;
    background: transparent; border: none;
    color: #C4A882; font-size: 11px; font-family: var(--fb);
    cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .nav-btn.active { background: var(--gold); color: #FFF9EE; }
  .nav-btn:active { filter: brightness(0.9); }

  /* ── Search bar ── */
  .search-bar {
    padding: 11px 13px;
    background: linear-gradient(to bottom, #EDE0C4, #F2E4C4);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
    flex-shrink: 0;
  }
  .search-input {
    flex: 1; padding: 9px 13px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: var(--fb); font-size: 14px; color: var(--text);
    direction: rtl;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.07);
  }
  .search-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2.5px rgba(139,105,20,0.18); }
  .fav-toggle {
    padding: 9px 14px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 18px; cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }
  .fav-toggle.on { background: #7C3A1E; color: #FFD700; }

  /* ── Category bar ── */
  .cat-bar {
    display: flex; gap: 8px;
    padding: 9px 13px;
    overflow-x: auto;
    background: #EDE0C4;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0; padding: 5px 14px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 20px; font-size: 12px;
    color: var(--brown); cursor: pointer;
    font-family: var(--fb); white-space: nowrap;
    transition: all 0.2s;
  }
  .cat-pill.active { color: #FFF9EE; font-weight: 600; }
  .cat-pill:active { filter: brightness(0.92); }
  .cat-manage-btn {
    flex-shrink: 0; padding: 5px 12px;
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: 20px; font-size: 11px;
    color: var(--muted); cursor: pointer;
    font-family: var(--fb); white-space: nowrap;
  }

  /* ── Cards ── */
  .cards-list { padding: 12px 13px; display: flex; flex-direction: column; gap: 13px; }
  .card {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 11px; cursor: pointer;
    box-shadow: 2px 4px 16px rgba(0,0,0,0.1);
    overflow: hidden; position: relative;
    animation: fadeSlide 0.3s ease both;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:active { transform: scale(0.98); }
  .card-accent { position: absolute; top: 0; right: 0; width: 5px; height: 100%; border-radius: 0 11px 11px 0; }
  .card-img { width: 100%; height: 165px; object-fit: cover; display: block; }
  .card-body { padding: 13px 14px 12px 12px; }
  .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .card-emoji { font-size: 30px; line-height: 1; }
  .card-info { flex: 1; }
  .card-title { font-family: var(--ff); font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.25; margin-bottom: 3px; }
  .card-cat-badge { display: inline-block; font-size: 10px; font-weight: 600; color: #FFF9EE; padding: 1px 9px; border-radius: 9px; letter-spacing: 0.3px; }
  .card-desc { font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.55; margin-bottom: 9px; }
  .card-meta { display: flex; gap: 13px; font-size: 11px; color: var(--gold); border-top: 1px dashed var(--light); padding-top: 8px; }
  .fav-star { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--light); padding: 0 0 0 2px; transition: transform 0.18s; }
  .fav-star.on { color: var(--gold); }
  .fav-star:active { transform: scale(1.3); }

  .empty-state { text-align: center; padding: 52px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── Detail page ── */
  .detail-hero {
    background: linear-gradient(168deg, var(--dark), var(--brown));
    padding: 15px 17px 19px;
    position: relative; flex-shrink: 0;
  }
  .detail-hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(139,105,20,0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .back-btn {
    background: rgba(255,249,238,0.14);
    border: 1px solid rgba(255,249,238,0.28);
    color: #FFF9EE; padding: 7px 14px;
    border-radius: 5px; cursor: pointer;
    font-family: var(--fb); font-size: 12px;
    margin-bottom: 13px; display: inline-block;
  }
  .back-btn:active { filter: brightness(0.85); }
  .detail-img-hero { width: 100%; height: 210px; object-fit: cover; border-radius: 10px; border: 2px solid rgba(255,249,238,0.25); margin-bottom: 13px; display: block; }
  .detail-emoji { text-align: center; font-size: 52px; margin-bottom: 7px; }
  .detail-title { font-family: var(--ff); font-size: 22px; font-weight: 900; color: #FFF9EE; text-align: center; text-shadow: 1px 2px 7px rgba(0,0,0,0.45); line-height: 1.2; }
  .detail-badges { display: flex; justify-content: center; gap: 8px; margin-top: 11px; flex-wrap: wrap; }
  .badge { background: rgba(255,249,238,0.15); border: 1px solid rgba(255,249,238,0.3); color: #FFF9EE; padding: 3px 11px; border-radius: 12px; font-size: 12px; }
  .detail-actions { display: flex; gap: 8px; margin-top: 13px; justify-content: center; flex-wrap: wrap; }
  .act-btn { border: none; padding: 7px 16px; border-radius: 5px; cursor: pointer; font-family: var(--fb); font-size: 12px; font-weight: 600; transition: all 0.18s; }
  .act-btn:active { transform: scale(0.96); }
  .act-btn.gold { background: var(--gold); color: #FFF9EE; }
  .act-btn.red { background: var(--red); color: #FFF9EE; }
  .act-btn.fav { background: rgba(255,249,238,0.15); border: 1px solid rgba(255,249,238,0.3); color: #FFF9EE; font-size: 13px; }
  .act-btn.fav.on { color: #FFD700; }

  .detail-body { padding: 19px 17px 36px; }
  .detail-quote { font-style: italic; color: var(--muted); font-size: 14px; line-height: 1.78; margin-bottom: 18px; background: rgba(200,168,122,0.08); border-right: 4px solid var(--light); padding: 10px 12px; border-radius: 0 6px 6px 0; }
  .tags-row { margin-bottom: 18px; }
  .tag { display: inline-block; background: var(--light); border: 1px solid var(--border); color: var(--brown); padding: 2px 10px; border-radius: 12px; font-size: 11px; margin-left: 5px; margin-bottom: 4px; }
  .section-title { font-family: var(--ff); font-size: 15px; font-weight: 700; color: var(--brown); border-bottom: 2px solid var(--light); padding-bottom: 7px; margin-bottom: 12px; letter-spacing: 0.8px; display: flex; align-items: center; gap: 7px; }
  .ing-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px dashed var(--light); font-size: 14px; color: var(--text); }
  .ing-dot { color: var(--gold); font-size: 11px; }
  .step-item { display: flex; gap: 12px; margin-bottom: 13px; align-items: flex-start; }
  .step-num { background: var(--brown); color: #FFF9EE; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; font-weight: 700; font-family: var(--ff); }
  .step-text { font-size: 14px; color: var(--text); line-height: 1.72; flex: 1; padding-top: 4px; }
  .detail-footer { text-align: center; color: var(--light); font-size: 18px; margin-top: 32px; letter-spacing: 10px; }

  /* ── Servings scaler ── */
  .servings-bar {
    display: flex; align-items: center; gap: 12px;
    background: var(--cream); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    margin-bottom: 20px;
  }
  .servings-label { font-family: var(--ff); font-size: 13px; color: var(--brown); font-weight: 700; flex:1; }
  .servings-count { font-family: var(--ff); font-size: 20px; font-weight: 900; color: var(--brown); min-width: 32px; text-align: center; }
  .srv-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--brown); color: #FFF9EE;
    border: none; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; font-weight: 700; line-height:1;
  }
  .srv-btn:active { transform: scale(0.9); filter: brightness(0.85); }
  .srv-btn:disabled { background: var(--light); color: var(--border); }
  .ing-amount { color: var(--gold); font-weight: 700; }

  /* ── Timer ── */
  .step-timer-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(139,105,20,0.1); border: 1.5px solid var(--gold);
    color: var(--gold); border-radius: 6px;
    padding: 4px 10px; font-size: 12px; cursor: pointer;
    font-family: var(--fb); margin-top: 6px; transition: all 0.2s;
  }
  .step-timer-btn:active { background: rgba(139,105,20,0.22); }
  .step-timer-btn.running { background: var(--brown); color: #FFF9EE; border-color: var(--brown); }
  .step-timer-btn.done { background: #3D6B45; color: #FFF9EE; border-color: #3D6B45; }

  /* ── Timer overlay ── */
  .timer-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.82);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .timer-overlay.show { display: flex; }
  .timer-box {
    background: linear-gradient(160deg, var(--dark), var(--brown));
    border: 3px solid var(--gold); border-radius: 24px;
    padding: 36px 40px; text-align: center;
    width: 88%; max-width: 320px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: modalIn 0.25s ease;
  }
  .timer-step-label { font-size: 12px; color: #C4A882; letter-spacing: 2px; margin-bottom: 10px; font-style: italic; }
  .timer-display {
    font-family: var(--ff); font-size: 72px; font-weight: 900;
    color: #FFF9EE; letter-spacing: 4px; line-height: 1;
    text-shadow: 0 0 30px rgba(139,105,20,0.6);
    margin: 8px 0 24px;
  }
  .timer-display.urgent { color: #E8774A; animation: timerPulse 0.6s ease infinite; }
  @keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .timer-btns { display: flex; gap: 12px; justify-content: center; }
  .timer-action-btn {
    padding: 12px 24px; border-radius: 10px; border: none;
    font-family: var(--ff); font-size: 15px; cursor: pointer;
    font-weight: 700; transition: all 0.18s; letter-spacing: 0.5px;
  }
  .timer-action-btn:active { transform: scale(0.95); }
  .timer-action-btn.primary { background: var(--gold); color: #FFF9EE; }
  .timer-action-btn.secondary { background: rgba(255,249,238,0.12); color: #FFF9EE; border: 1px solid rgba(255,249,238,0.3); }
  .timer-progress { width: 100%; height: 5px; background: rgba(255,249,238,0.15); border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
  .timer-progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.5s linear; }

  /* ── Form ── */
  .form-subhdr { display: flex; align-items: center; background: var(--dark); border-bottom: 2px solid var(--gold); padding: 0 13px; flex-shrink: 0; }
  .form-back-btn { background: transparent; border: none; color: #C4A882; padding: 12px 8px; cursor: pointer; font-family: var(--fb); font-size: 12px; }
  .form-title-mid { flex: 1; text-align: center; color: var(--gold); font-family: var(--ff); font-size: 13px; }
  .progress-wrap { background: var(--dark); padding: 10px 14px 12px; flex-shrink: 0; }
  .progress-bars { display: flex; gap: 4px; }
  .progress-bar { flex: 1; height: 4px; border-radius: 2px; background: rgba(122,92,58,0.35); transition: background 0.35s; }
  .progress-bar.done { background: var(--gold); }
  .progress-labels { display: flex; justify-content: space-between; margin-top: 5px; }
  .progress-lbl { font-size: 10px; color: var(--muted); font-style: italic; transition: color 0.3s; }
  .progress-lbl.active { color: var(--gold); }

  .form-body { padding: 17px 17px 50px; }
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 12px; color: var(--brown); margin-bottom: 5px; font-weight: 700; letter-spacing: 0.5px; font-family: var(--ff); }
  .field input, .field select, .field textarea {
    width: 100%; padding: 9px 12px;
    background: var(--cream); border: 1.5px solid var(--border);
    border-radius: 6px; font-family: var(--fb);
    font-size: 14px; color: var(--text); direction: rtl;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--gold);
    box-shadow: 0 0 0 2.5px rgba(139,105,20,0.18);
  }
  .field textarea { min-height: 68px; resize: vertical; }
  .row-2 { display: flex; gap: 10px; }
  .row-2 .field { flex: 1; }

  .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .emoji-btn { font-size: 22px; background: transparent; border: 2px solid transparent; border-radius: 6px; padding: 4px; cursor: pointer; transition: all 0.15s; }
  .emoji-btn.sel { background: var(--light); border-color: var(--gold); }
  .emoji-btn:active { transform: scale(0.9); }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: 9px;
    padding: 20px; text-align: center; cursor: pointer;
    background: rgba(139,105,20,0.03);
    transition: all 0.2s; margin-top: 6px;
  }
  .upload-zone.has-img { padding: 6px; }
  .upload-zone:active { border-color: var(--gold); background: rgba(139,105,20,0.07); }
  .upload-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 7px; border: 1.5px solid var(--border); display: block; }
  .upload-icon { font-size: 30px; margin-bottom: 6px; }
  .upload-text { font-size: 13px; color: var(--muted); }
  .upload-sub { font-size: 11px; color: var(--light); margin-top: 2px; }

  .dyn-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .dyn-input { flex: 1; padding: 9px 12px; background: var(--cream); border: 1.5px solid var(--border); border-radius: 6px; font-family: var(--fb); font-size: 14px; color: var(--text); direction: rtl; }
  .dyn-input:focus { outline: none; border-color: var(--gold); }
  .remove-btn { background: var(--red); color: #FFF9EE; border: none; border-radius: 5px; padding: 0 11px; cursor: pointer; font-size: 18px; flex-shrink: 0; }
  .remove-btn:active { filter: brightness(0.85); }
  .add-more-btn { background: transparent; border: 1.5px dashed var(--border); color: var(--muted); border-radius: 5px; padding: 9px; cursor: pointer; font-family: var(--fb); font-size: 13px; width: 100%; margin-top: 4px; transition: all 0.2s; }
  .add-more-btn:active { border-color: var(--gold); color: var(--brown); }
  .remove-img-btn { background: transparent; border: 1.5px solid var(--red); color: var(--red); border-radius: 5px; padding: 7px; cursor: pointer; font-family: var(--fb); font-size: 12px; width: 100%; margin-top: 6px; }

  .step-label { font-size: 11px; color: var(--gold); margin-bottom: 5px; font-family: var(--ff); }

  .btn-gold {
    background: linear-gradient(170deg, var(--brown), var(--dark));
    color: #FFF9EE; border: 2px solid var(--gold);
    border-radius: 7px; padding: 13px;
    cursor: pointer; font-family: var(--ff);
    font-size: 15px; letter-spacing: 1px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.22);
    transition: all 0.2s; width: 100%; margin-top: 8px;
  }
  .btn-gold:active { transform: scale(0.98); filter: brightness(0.92); }
  .btn-gray {
    background: var(--light); color: var(--brown);
    border: 1.5px solid var(--border);
    border-radius: 7px; padding: 12px;
    cursor: pointer; font-family: var(--ff);
    font-size: 14px; transition: all 0.2s;
  }
  .btn-gray:active { filter: brightness(0.92); }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn-row .btn-gray { flex: 1; }
  .btn-row .btn-gold { flex: 2; margin-top: 0; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 300;
    display: none; align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--cream);
    border-radius: 14px; padding: 24px;
    width: 100%; max-width: 340px;
    border: 2px solid var(--border);
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    animation: modalIn 0.22s ease;
    max-height: 80vh; overflow-y: auto;
  }
  .modal-title { font-family: var(--ff); font-size: 18px; font-weight: 700; color: var(--brown); text-align: center; margin-bottom: 10px; }
  .modal-text { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 20px; line-height: 1.6; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-cancel { flex: 1; padding: 11px; background: var(--light); border: 1.5px solid var(--border); border-radius: 7px; cursor: pointer; font-family: var(--fb); font-size: 14px; color: var(--brown); }
  .modal-confirm { flex: 1; padding: 11px; background: var(--red); border: none; border-radius: 7px; cursor: pointer; font-family: var(--fb); font-size: 14px; color: #FFF9EE; font-weight: 600; }
  .modal-cancel:active, .modal-confirm:active { filter: brightness(0.88); }

  .cat-man-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px dashed var(--light); }
  .cat-man-icon { font-size: 18px; }
  .cat-man-name { flex: 1; font-size: 14px; color: var(--text); font-family: var(--fb); }
  .cat-edit-input { flex: 1; padding: 5px 9px; background: var(--cream); border: 1.5px solid var(--gold); border-radius: 4px; font-family: var(--fb); font-size: 13px; color: var(--text); direction: rtl; }
  .cat-edit-input:focus { outline: none; }
  .cat-btns { display: flex; gap: 4px; }
  .cat-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 12px; color: var(--brown); }
  .cat-btn.red { border-color: var(--red); color: var(--red); }
  .cat-btn.gold { background: var(--gold); border-color: var(--gold); color: #FFF9EE; }
  .cat-btn.gray { background: var(--light); border-color: var(--border); color: var(--brown); }
  .cat-btn:active { filter: brightness(0.88); }
  .new-cat-row { display: flex; gap: 8px; margin-top: 14px; }
  .new-cat-input { flex: 1; padding: 9px 12px; background: var(--cream); border: 1.5px solid var(--border); border-radius: 6px; font-family: var(--fb); font-size: 14px; color: var(--text); direction: rtl; }
  .new-cat-input:focus { outline: none; border-color: var(--gold); }
  .new-cat-add { background: var(--gold); border: none; color: #FFF9EE; border-radius: 6px; padding: 0 16px; cursor: pointer; font-size: 22px; flex-shrink: 0; }

  @keyframes fadeSlide { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes modalIn { from { opacity:0; transform:scale(0.93) translateY(16px); } to { opacity:1; transform:scale(1) translateY(0); } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--light); }

<script>

// ══════════════════════════════════════════════════════
//  STATE — persisted in localStorage
// ══════════════════════════════════════════════════════
function loadState() {
  try {
    const saved = localStorage.getItem('recipeBookState');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { recipes: SAMPLE_RECIPES, cats: DEFAULT_CATS };
}
function saveState() {
  try { localStorage.setItem('recipeBookState', JSON.stringify({ recipes: state.recipes, cats: state.cats })); } catch(e) {}
}

const initialState = loadState();
const state = {
  recipes: initialState.recipes,
  cats: initialState.cats,
  activeCat: 'הכל',
  favOnly: false,
  currentPage: 'home',
  detailId: null,
  detailServings: null,
  editMode: false,
  delTargetId: null,
  formStep: 1,
  fd: null,
  editCatIdx: null,
};

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  // scroll to top
  const sa = document.querySelector('#page-' + name + ' .scroll-area');
  if (sa) sa.scrollTop = 0;
  state.currentPage = name;
}

function goHome() { showPage('home'); renderHome(); }

// ══════════════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════════════
function renderHome() {
  renderCatBar();
  renderCards();
  const favs = state.recipes.filter(r => r.favorite).length;
  document.getElementById('hdr-count').textContent = state.recipes.length + ' מתכונים · ' + favs + ' מועדפים';
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  const all = ['הכל', ...state.cats];
  bar.innerHTML = all.map(cat => {
    const active = state.activeCat === cat;
    const bg = active ? (cat === 'הכל' ? '#5C3D1E' : (CAT_COLORS[cat] || '#5C3D1E')) : '#FFF9EE';
    const border = active ? bg : '#C8A87A';
    return `<button class="cat-pill${active?' active':''}" style="background:${bg};border-color:${border}" onclick="setCat('${esc(cat)}')">${cat !== 'הכל' ? (CAT_ICONS[cat]||'🍽️')+' ' : ''}${esc(cat)}</button>`;
  }).join('') + `<button class="cat-manage-btn" onclick="openCatModal()">+ ניהול</button>`;
}

function setCat(cat) { state.activeCat = cat; renderCatBar(); renderCards(); }

function toggleFavFilter() {
  state.favOnly = !state.favOnly;
  const btn = document.getElementById('fav-toggle');
  btn.classList.toggle('on', state.favOnly);
  renderCards();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return state.recipes.filter(r => {
    if (state.favOnly && !r.favorite) return false;
    if (state.activeCat !== 'הכל' && r.category !== state.activeCat) return false;
    if (q) return r.title.toLowerCase().includes(q) || r.description.toLowerCase().includes(q) || r.tags.some(t => t.toLowerCase().includes(q));
    return true;
  });
}

function renderCards() {
  const filtered = getFiltered();
  const list = document.getElementById('cards-list');
  document.getElementById('filter-count').textContent = filtered.length + ' מתכונים' + (state.favOnly?' מועדפים':'') + (state.activeCat!=='הכל'?' ב'+state.activeCat:'');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div style="font-style:italic">לא נמצאו מתכונים</div></div>`;
    return;
  }

  list.innerHTML = filtered.map((r, idx) => {
    const catColor = CAT_COLORS[r.category] || '#8B6914';
    const catIcon = CAT_ICONS[r.category] || '';
    return `
    <div class="card" style="animation-delay:${idx*0.04}s" onclick="openDetail(${r.id})">
      ${r.image ? `<img class="card-img" src="${r.image}" alt="${esc(r.title)}">` : ''}
      <div class="card-accent" style="background:${catColor}"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-emoji">${r.emoji}</span>
          <div class="card-info">
            <div class="card-title">${esc(r.title)}</div>
            <span class="card-cat-badge" style="background:${catColor}">${catIcon} ${esc(r.category)}</span>
          </div>
          <button class="fav-star${r.favorite?' on':''}" onclick="event.stopPropagation();toggleFav(${r.id})">${r.favorite?'★':'☆'}</button>
        </div>
        <div class="card-desc">${esc(r.description)}</div>
        <div class="card-meta">
          <span>⏱ ${esc(r.time)}</span>
          <span>👥 ${r.servings} מנות</span>
          <span>📊 ${esc(r.difficulty)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleFav(id) {
  state.recipes = state.recipes.map(r => r.id === id ? {...r, favorite: !r.favorite} : r);
  saveState();
  renderCards();
  document.getElementById('hdr-count').textContent = state.recipes.length + ' מתכונים · ' + state.recipes.filter(r=>r.favorite).length + ' מועדפים';
}

// ══════════════════════════════════════════════════════
//  DETAIL
// ══════════════════════════════════════════════════════
function openDetail(id) {
  state.detailId = id;
  state.detailServings = null; // reset scaler
  renderDetail();
  showPage('detail');
}

function renderDetail() {
  const id = state.detailId;
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;

  const scaledServings = state.detailServings || r.servings;
  const ratio = scaledServings / (r.servings || 1);

  // Hero
  document.getElementById('detail-hero').innerHTML = `
    <button class="back-btn" onclick="goHome()">← חזרה לכל המתכונים</button>
    ${r.image ? `<img class="detail-img-hero" src="${r.image}" alt="${esc(r.title)}">` : `<div class="detail-emoji">${r.emoji}</div>`}
    <div class="detail-title">${esc(r.title)}</div>
    <div class="detail-badges">
      <span class="badge">⏱ ${esc(r.time)}</span>
      <span class="badge">📊 ${esc(r.difficulty)}</span>
    </div>
    <div class="detail-actions">
      <button class="act-btn fav${r.favorite?' on':''}" id="det-fav-btn" onclick="toggleFavDetail(${r.id})">${r.favorite?'★ מועדף':'☆ הוסף למועדפים'}</button>
      <button class="act-btn gold" onclick="openEdit(${r.id})">✏️ עריכה</button>
      <button class="act-btn red" onclick="openDelModal(${r.id})">🗑 מחיקה</button>
    </div>
  `;

  // Parse ingredient amounts for scaling
  function scaleIngredient(ing) {
    // Match number (including fractions like 1/2) at start or after common prefixes
    return ing.replace(/(\d+(?:[.,]\d+)?(?:\/\d+)?)/g, (match) => {
      const parts = match.split('/');
      let num = parts.length === 2 ? parseInt(parts[0]) / parseInt(parts[1]) : parseFloat(match.replace(',','.'));
      if (isNaN(num)) return match;
      const scaled = num * ratio;
      // Format nicely
      let display;
      if (Math.abs(scaled - Math.round(scaled)) < 0.05) display = Math.round(scaled).toString();
      else if (Math.abs(scaled - 0.25) < 0.05) display = '¼';
      else if (Math.abs(scaled - 0.5) < 0.05) display = '½';
      else if (Math.abs(scaled - 0.75) < 0.05) display = '¾';
      else if (Math.abs(scaled - 1.5) < 0.05) display = '1½';
      else if (Math.abs(scaled - 2.5) < 0.05) display = '2½';
      else display = (Math.round(scaled * 4) / 4).toString();
      return `<span class="ing-amount">${display}</span>`;
    });
  }

  // Extract timer hint from step text (looks for numbers followed by דקות/שעה/שעות/שניות)
  function extractTimer(step) {
    const m = step.match(/(\d+)\s*(דקות?|שעות?|שניות?)/);
    if (!m) return null;
    const n = parseInt(m[1]);
    const unit = m[2];
    if (unit.startsWith('שעה') || unit.startsWith('שעות')) return n * 3600;
    if (unit.startsWith('שניות') || unit.startsWith('שנייה')) return n;
    return n * 60; // דקות
  }

  const tags = r.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
  const ings = r.ingredients.map(i => `<div class="ing-item"><span class="ing-dot">✦</span><span>${ratio === 1 ? esc(i) : scaleIngredient(esc(i))}</span></div>`).join('');
  const steps = r.steps.map((s, i) => {
    const secs = extractTimer(s);
    const timerBtn = secs ? `<br><button class="step-timer-btn" onclick="openTimer(${secs}, ${i+1})">⏱ הפעל טיימר · ${formatTime(secs)}</button>` : '';
    return `<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${esc(s)}${timerBtn}</div></div>`;
  }).join('');

  document.getElementById('detail-body').innerHTML = `
    <p class="detail-quote">${esc(r.description)}</p>
    ${tags ? `<div class="tags-row">${tags}</div>` : ''}

    <div class="section-title"><span>🌿</span> מצרכים</div>
    <div class="servings-bar">
      <span class="servings-label">👥 כמות מנות</span>
      <button class="srv-btn" onclick="changeServings(-1)" ${scaledServings <= 1 ? 'disabled' : ''}>−</button>
      <span class="servings-count">${scaledServings}</span>
      <button class="srv-btn" onclick="changeServings(1)">+</button>
    </div>
    <div style="margin-bottom:22px">${ings}</div>

    <div class="section-title"><span>📋</span> אופן הכנה</div>
    ${steps}
    <div class="detail-footer">✦ ✦ ✦</div>
  `;
}

function changeServings(delta) {
  const r = state.recipes.find(x => x.id === state.detailId);
  if (!r) return;
  const current = state.detailServings || r.servings;
  const next = Math.max(1, current + delta);
  state.detailServings = next;
  renderDetail();
  // Keep scroll position
}

function toggleFavDetail(id) {
  toggleFav(id);
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;
  const btn = document.getElementById('det-fav-btn');
  if (btn) { btn.textContent = r.favorite ? '★ מועדף' : '☆ הוסף למועדפים'; btn.classList.toggle('on', r.favorite); }
}

// ══════════════════════════════════════════════════════
//  DELETE MODAL
// ══════════════════════════════════════════════════════
function openDelModal(id) {
  state.delTargetId = id;
  const r = state.recipes.find(x => x.id === id);
  document.getElementById('del-modal-text').innerHTML = `האם למחוק את <strong>"${esc(r.title)}"</strong>?<br>פעולה זו אינה ניתנת לביטול.`;
  document.getElementById('del-modal').classList.add('show');
}
function closeDelModal() { document.getElementById('del-modal').classList.remove('show'); state.delTargetId = null; }
function confirmDelete() {
  state.recipes = state.recipes.filter(r => r.id !== state.delTargetId);
  saveState();
  closeDelModal();
  goHome();
}

// ══════════════════════════════════════════════════════
//  CATEGORY MODAL
// ══════════════════════════════════════════════════════
function openCatModal() {
  state.editCatIdx = null;
  renderCatModalList();
  document.getElementById('cat-modal').classList.add('show');
}
function closeCatModal() {
  document.getElementById('cat-modal').classList.remove('show');
  state.editCatIdx = null;
  renderCatBar();
}
function renderCatModalList() {
  document.getElementById('cat-modal-list').innerHTML = state.cats.map((cat, i) => {
    if (state.editCatIdx === i) {
      return `<div class="cat-man-row">
        <span class="cat-man-icon">${CAT_ICONS[cat]||'🍽️'}</span>
        <input class="cat-edit-input" id="cat-edit-inp-${i}" value="${esc(cat)}" onkeydown="if(event.key==='Enter')saveEditCat(${i});if(event.key==='Escape')cancelEditCat()">
        <div class="cat-btns">
          <button class="cat-btn gold" onclick="saveEditCat(${i})">✓</button>
          <button class="cat-btn gray" onclick="cancelEditCat()">✕</button>
        </div>
      </div>`;
    }
    return `<div class="cat-man-row">
      <span class="cat-man-icon">${CAT_ICONS[cat]||'🍽️'}</span>
      <span class="cat-man-name">${esc(cat)}</span>
      <div class="cat-btns">
        <button class="cat-btn" onclick="startEditCat(${i})">✏️</button>
        <button class="cat-btn red" onclick="deleteCat(${i})">🗑</button>
      </div>
    </div>`;
  }).join('');
  // focus if editing
  if (state.editCatIdx !== null) {
    setTimeout(() => { const inp = document.getElementById('cat-edit-inp-'+state.editCatIdx); if(inp) inp.focus(); }, 50);
  }
}
function startEditCat(i) { state.editCatIdx = i; renderCatModalList(); }
function cancelEditCat() { state.editCatIdx = null; renderCatModalList(); }
function saveEditCat(i) {
  const inp = document.getElementById('cat-edit-inp-'+i);
  if (!inp || !inp.value.trim()) return;
  const oldCat = state.cats[i];
  const newCat = inp.value.trim();
  state.cats[i] = newCat;
  state.recipes = state.recipes.map(r => r.category === oldCat ? {...r, category: newCat} : r);
  if (state.activeCat === oldCat) state.activeCat = newCat;
  saveState();
  state.editCatIdx = null;
  renderCatModalList();
}
function deleteCat(i) {
  const cat = state.cats[i];
  state.cats.splice(i, 1);
  if (state.activeCat === cat) state.activeCat = 'הכל';
  saveState();
  renderCatModalList();
}
function addCategory() {
  const inp = document.getElementById('new-cat-input');
  const name = inp.value.trim();
  if (!name || state.cats.includes(name)) return;
  state.cats.push(name);
  inp.value = '';
  saveState();
  renderCatModalList();
}

// ══════════════════════════════════════════════════════
//  FORM
// ══════════════════════════════════════════════════════
function emptyFd() {
  return { title:'', category: state.cats[0]||'עיקריות', description:'', time:'', servings:'', difficulty:'קל', ingredients:[''], steps:[''], tags:'', emoji:'🍽️', image:null, id:null, favorite:false };
}

function openAdd() {
  state.editMode = false;
  state.fd = emptyFd();
  state.formStep = 1;
  renderForm();
  showPage('form');
}

function openEdit(id) {
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;
  state.editMode = true;
  state.fd = { ...r, tags: r.tags.join(', '), ingredients:[...r.ingredients], steps:[...r.steps] };
  state.formStep = 1;
  renderForm();
  showPage('form');
}

function formBack() {
  if (state.editMode) { openDetail(state.fd.id); }
  else { goHome(); }
}

function renderForm() {
  document.getElementById('form-title-mid').textContent = state.editMode ? '✏️ עריכת מתכון' : '✨ מתכון חדש';
  document.getElementById('form-back-btn').textContent = '← חזרה';

  // Progress
  document.getElementById('progress-bars').innerHTML = FORM_STEPS.map((_,i) =>
    `<div class="progress-bar${state.formStep > i ? ' done':''}"></div>`).join('');
  document.getElementById('progress-labels').innerHTML = FORM_STEPS.map((s,i) =>
    `<div class="progress-lbl${state.formStep===i+1?' active':''}">${s}</div>`).join('');

  // Body
  const body = document.getElementById('form-body');
  if (state.formStep === 1) body.innerHTML = renderFormStep1();
  if (state.formStep === 2) body.innerHTML = renderFormStep2();
  if (state.formStep === 3) body.innerHTML = renderFormStep3();

  // Scroll to top
  const sa = document.querySelector('#page-form .scroll-area');
  if (sa) sa.scrollTop = 0;
}

function renderFormStep1() {
  const fd = state.fd;
  const emojiGrid = EMOJIS.map(e =>
    `<button class="emoji-btn${fd.emoji===e?' sel':''}" onclick="selEmoji('${e}')">${e}</button>`).join('');

  return `
    <div class="field">
      <label>אימוג'י מייצג</label>
      <div class="emoji-grid">${emojiGrid}</div>
    </div>

    <div class="field">
      <label>תמונת מתכון 📸</label>
      <div class="upload-zone${fd.image?' has-img':''}" onclick="document.getElementById('img-file-input').click()">
        ${fd.image
          ? `<img class="upload-preview" src="${fd.image}" alt="תצוגה מקדימה">`
          : `<div class="upload-icon">📷</div><div class="upload-text">לחץ להעלאת תמונה</div><div class="upload-sub">JPG · PNG · WEBP</div>`}
      </div>
      ${fd.image ? `<button class="remove-img-btn" onclick="removeImg()">✕ הסר תמונה</button>` : ''}
    </div>

    <div class="field">
      <label>שם המתכון *</label>
      <input value="${esc(fd.title)}" oninput="state.fd.title=this.value" placeholder="למשל: עוגת גבינה של סבתא">
    </div>
    <div class="field">
      <label>קטגוריה</label>
      <select onchange="state.fd.category=this.value">
        ${state.cats.map(c => `<option value="${esc(c)}"${fd.category===c?' selected':''}>${esc(c)}</option>`).join('')}
      </select>
    </div>
    <div class="row-2">
      <div class="field"><label>זמן הכנה</label><input value="${esc(fd.time)}" oninput="state.fd.time=this.value" placeholder="45 דקות"></div>
      <div class="field"><label>מנות</label><input type="number" value="${fd.servings}" oninput="state.fd.servings=this.value" placeholder="4"></div>
    </div>
    <div class="field">
      <label>רמת קושי</label>
      <select onchange="state.fd.difficulty=this.value">
        ${DIFFS.map(d => `<option value="${d}"${fd.difficulty===d?' selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>תיאור קצר</label>
      <textarea oninput="state.fd.description=this.value" placeholder="תיאור מפתה...">${esc(fd.description)}</textarea>
    </div>
    <div class="field">
      <label>תגיות (מופרדות בפסיק)</label>
      <input value="${esc(fd.tags)}" oninput="state.fd.tags=this.value" placeholder="קיץ, כפרי, מסורתי">
    </div>
    <button class="btn-gold" onclick="nextStep()" ${!fd.title.trim()?'disabled':''}>הבא ←</button>
  `;
}

function renderFormStep2() {
  const fd = state.fd;
  const rows = fd.ingredients.map((ing, i) => `
    <div class="dyn-row">
      <input class="dyn-input" value="${esc(ing)}" oninput="state.fd.ingredients[${i}]=this.value" placeholder="מצרך ${i+1}...">
      ${fd.ingredients.length > 1 ? `<button class="remove-btn" onclick="removeIng(${i})">−</button>` : ''}
    </div>`).join('');
  return `
    ${rows}
    <button class="add-more-btn" onclick="addIng()">+ הוסף מצרך</button>
    <div class="btn-row">
      <button class="btn-gray" onclick="prevStep()">← חזרה</button>
      <button class="btn-gold" onclick="nextStep()" ${!fd.ingredients.some(i=>i.trim())?'disabled':''}>הבא ←</button>
    </div>
  `;
}

function renderFormStep3() {
  const fd = state.fd;
  const rows = fd.steps.map((step, i) => `
    <div style="margin-bottom:13px">
      <div class="step-label">שלב ${i+1}</div>
      <div class="dyn-row">
        <textarea class="dyn-input" style="min-height:52px;resize:vertical" oninput="state.fd.steps[${i}]=this.value" placeholder="תאר את שלב ${i+1}...">${esc(step)}</textarea>
        ${fd.steps.length > 1 ? `<button class="remove-btn" onclick="removeStep(${i})">−</button>` : ''}
      </div>
    </div>`).join('');
  return `
    ${rows}
    <button class="add-more-btn" onclick="addStep()">+ הוסף שלב</button>
    <div class="btn-row">
      <button class="btn-gray" onclick="prevStep()">← חזרה</button>
      <button class="btn-gold" onclick="saveRecipe()" ${!fd.steps.some(s=>s.trim())?'disabled':''}>${state.editMode?'💾 שמור שינויים':'✨ הוסף מתכון'}</button>
    </div>
  `;
}

function selEmoji(e) { state.fd.emoji = e; renderForm(); }
function removeImg() { state.fd.image = null; renderForm(); }
function nextStep() { state.formStep++; renderForm(); }
function prevStep() { state.formStep--; renderForm(); }
function removeIng(i) { state.fd.ingredients.splice(i,1); renderForm(); }
function addIng() { state.fd.ingredients.push(''); renderForm(); setTimeout(()=>{ const inputs=document.querySelectorAll('#form-body .dyn-input'); if(inputs.length) inputs[inputs.length-1].focus(); },50); }
function removeStep(i) { state.fd.steps.splice(i,1); renderForm(); }
function addStep() { state.fd.steps.push(''); renderForm(); setTimeout(()=>{ const ta=document.querySelectorAll('#form-body textarea'); if(ta.length) ta[ta.length-1].focus(); },50); }

function saveRecipe() {
  const fd = state.fd;
  const recipe = {
    ...fd,
    id: state.editMode ? fd.id : Date.now(),
    tags: fd.tags.split(',').map(t=>t.trim()).filter(Boolean),
    servings: parseInt(fd.servings)||4,
    ingredients: fd.ingredients.filter(i=>i.trim()),
    steps: fd.steps.filter(s=>s.trim()),
    favorite: state.editMode ? fd.favorite : false,
  };
  if (state.editMode) {
    state.recipes = state.recipes.map(r => r.id === recipe.id ? recipe : r);
    saveState();
    openDetail(recipe.id);
  } else {
    state.recipes.unshift(recipe);
    saveState();
    goHome();
  }
}

function handleImgUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { state.fd.image = ev.target.result; renderForm(); };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ══════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════
const timerState = { total: 0, remaining: 0, running: false, interval: null, stepNum: 0 };

function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function openTimer(seconds, stepNum) {
  stopTimer();
  timerState.total = seconds;
  timerState.remaining = seconds;
  timerState.running = false;
  timerState.stepNum = stepNum;
  updateTimerUI();
  document.getElementById('timer-overlay').classList.add('show');
}

function closeTimer() {
  stopTimer();
  document.getElementById('timer-overlay').classList.remove('show');
}

function toggleTimer() {
  if (timerState.running) {
    stopTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (timerState.remaining <= 0) {
    timerState.remaining = timerState.total; // restart
  }
  timerState.running = true;
  document.getElementById('timer-toggle-btn').textContent = '⏸ עצור';
  timerState.interval = setInterval(() => {
    timerState.remaining--;
    updateTimerUI();
    if (timerState.remaining <= 0) {
      stopTimer();
      timerDone();
    }
  }, 1000);
}

function stopTimer() {
  timerState.running = false;
  clearInterval(timerState.interval);
  const btn = document.getElementById('timer-toggle-btn');
  if (btn) btn.textContent = timerState.remaining <= 0 ? '🔄 התחל מחדש' : '▶ המשך';
}

function timerDone() {
  const disp = document.getElementById('timer-display');
  if (disp) { disp.textContent = '✓ סיום!'; disp.classList.add('urgent'); }
  const btn = document.getElementById('timer-toggle-btn');
  if (btn) btn.textContent = '🔄 שוב';
  // Vibrate if supported
  if (navigator.vibrate) navigator.vibrate([400, 200, 400, 200, 400]);
  // Audio beep
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.3);
    });
  } catch(e) {}
}

function updateTimerUI() {
  const disp = document.getElementById('timer-display');
  const fill = document.getElementById('timer-progress-fill');
  const lbl  = document.getElementById('timer-step-label');
  const btn  = document.getElementById('timer-toggle-btn');
  if (!disp) return;
  disp.textContent = formatTime(timerState.remaining);
  disp.classList.toggle('urgent', timerState.remaining <= 10 && timerState.running);
  if (fill) fill.style.width = (timerState.remaining / timerState.total * 100) + '%';
  if (lbl) lbl.textContent = `⏱ שלב ${timerState.stepNum}`;
  if (btn && timerState.remaining > 0) btn.textContent = timerState.running ? '⏸ עצור' : (timerState.remaining < timerState.total ? '▶ המשך' : '▶ התחל');
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
renderHome();
</script>
</body>
