<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3A2210">
<title>ספר המתכונים שלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7EDD8;--cream:#FFF9EE;--border:#C8A87A;--brown:#5C3D1E;--dark:#3A2210;--gold:#8B6914;--text:#2C1A0E;--muted:#7A5C3A;--light:#E8D5B0;--red:#8B3A3A;--ff:'Playfair Display',Georgia,serif;--fb:'Lora',Georgia,serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--dark);overflow:hidden;}
body{font-family:var(--fb);}
#app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.page{display:none;flex-direction:column;height:100%;overflow:hidden;}
.page.active{display:flex;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{width:3px;}
.scroll-area::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}

/* ── HEADER ── */
.hdr{background:linear-gradient(168deg,var(--dark) 0%,var(--brown) 65%,#7A4A2A 100%);padding:16px 18px 13px;text-align:center;border-bottom:3px solid var(--gold);box-shadow:0 6px 28px rgba(0,0,0,.38);position:relative;overflow:hidden;flex-shrink:0;}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 15%,rgba(139,105,20,.22) 0%,transparent 55%);pointer-events:none;}
.hdr-orn{color:var(--gold);font-size:10px;letter-spacing:12px;opacity:.75;margin-bottom:4px;}
.hdr-title{font-family:var(--ff);font-size:24px;font-weight:900;color:#FFF9EE;letter-spacing:2px;text-shadow:2px 3px 8px rgba(0,0,0,.5);line-height:1.1;}
.hdr-sub{font-size:9px;color:#C4A882;letter-spacing:5px;margin-top:3px;font-style:italic;opacity:.9;}
.hdr-count{font-size:11px;color:var(--gold);margin-top:5px;opacity:.85;}
.hdr-sm{padding:11px 18px 9px;}
.hdr-sm .hdr-title{font-size:19px;}

/* ── NAV ── */
.nav{display:flex;background:var(--dark);border-bottom:2px solid var(--gold);flex-shrink:0;}
.nav-btn{flex:1;padding:11px 2px;background:transparent;border:none;color:#C4A882;font-size:11px;font-family:var(--fb);cursor:pointer;letter-spacing:.3px;transition:background .2s,color .2s;}
.nav-btn.active{background:var(--gold);color:#FFF9EE;}
.nav-btn:active{filter:brightness(.88);}

/* ── SEARCH ── */
.search-bar{padding:10px 12px;background:linear-gradient(to bottom,#EDE0C4,#F2E4C4);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.search-input{flex:1;padding:9px 12px;background:var(--cream);border:1.5px solid var(--border);border-radius:6px;font-family:var(--fb);font-size:14px;color:var(--text);direction:rtl;}
.search-input:focus{outline:none;border-color:var(--gold);}
.fav-toggle{padding:9px 13px;background:var(--cream);border:1.5px solid var(--border);border-radius:6px;font-size:18px;cursor:pointer;color:var(--muted);transition:all .2s;flex-shrink:0;}
.fav-toggle.on{background:#7C3A1E;color:#FFD700;}

/* ── CAT BAR ── */
.cat-bar{display:flex;gap:7px;padding:9px 12px;overflow-x:auto;background:#EDE0C4;border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:5px 13px;background:var(--cream);border:1.5px solid var(--border);border-radius:20px;font-size:12px;color:var(--brown);cursor:pointer;font-family:var(--fb);white-space:nowrap;transition:all .2s;}
.cat-pill.active{color:#FFF9EE;font-weight:600;}
.cat-pill:active{filter:brightness(.9);}
.cat-manage-pill{flex-shrink:0;padding:5px 11px;background:transparent;border:1.5px dashed var(--border);border-radius:20px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--fb);white-space:nowrap;}
.cat-manage-pill:active{border-color:var(--gold);}

/* ── CARDS ── */
.cards-list{padding:11px 12px;display:flex;flex-direction:column;gap:12px;}
.card{background:var(--cream);border:1.5px solid var(--border);border-radius:11px;cursor:pointer;box-shadow:2px 4px 14px rgba(0,0,0,.1);overflow:hidden;position:relative;animation:fadeSlide .3s ease both;transition:box-shadow .2s;}
.card:active{box-shadow:1px 2px 5px rgba(0,0,0,.1);}
.card-accent{position:absolute;top:0;right:0;width:5px;height:100%;border-radius:0 11px 11px 0;}
.card-img{width:100%;height:158px;object-fit:cover;display:block;}
.card-body{padding:12px 13px 11px 11px;}
.card-top{display:flex;align-items:flex-start;gap:9px;margin-bottom:7px;}
.card-emoji{font-size:28px;line-height:1;flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-title{font-family:var(--ff);font-size:16px;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-cat-badge{display:inline-block;font-size:10px;font-weight:600;color:#FFF9EE;padding:1px 8px;border-radius:9px;}
.card-desc{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-meta{display:flex;gap:12px;font-size:11px;color:var(--gold);border-top:1px dashed var(--light);padding-top:7px;}
.fav-star{background:none;border:none;font-size:20px;cursor:pointer;color:var(--light);padding:2px;flex-shrink:0;transition:transform .15s;}
.fav-star.on{color:var(--gold);}
.fav-star:active{transform:scale(1.3);}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-icon{font-size:46px;margin-bottom:11px;}
.empty-hint{font-size:13px;margin-top:10px;opacity:.7;}
.filter-count{padding:7px 12px 0;font-size:11px;color:var(--muted);font-style:italic;flex-shrink:0;}

/* ── DETAIL ── */
.detail-hero{background:linear-gradient(168deg,var(--dark),var(--brown));padding:14px 16px 18px;position:relative;flex-shrink:0;}
.detail-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 30%,rgba(139,105,20,.18) 0%,transparent 60%);pointer-events:none;}
.back-btn{background:rgba(255,249,238,.13);border:1px solid rgba(255,249,238,.27);color:#FFF9EE;padding:7px 13px;border-radius:5px;cursor:pointer;font-family:var(--fb);font-size:12px;margin-bottom:12px;display:inline-block;position:relative;z-index:1;}
.back-btn:active{background:rgba(255,249,238,.22);}
.detail-img-hero{width:100%;height:195px;object-fit:cover;border-radius:10px;border:2px solid rgba(255,249,238,.22);margin-bottom:12px;display:block;position:relative;z-index:1;}
.detail-emoji{text-align:center;font-size:50px;margin-bottom:6px;position:relative;z-index:1;}
.detail-title{font-family:var(--ff);font-size:21px;font-weight:900;color:#FFF9EE;text-align:center;text-shadow:1px 2px 7px rgba(0,0,0,.45);line-height:1.2;position:relative;z-index:1;}
.detail-badges{display:flex;justify-content:center;gap:7px;margin-top:10px;flex-wrap:wrap;position:relative;z-index:1;}
.badge{background:rgba(255,249,238,.14);border:1px solid rgba(255,249,238,.28);color:#FFF9EE;padding:3px 10px;border-radius:12px;font-size:12px;}
.detail-actions{display:flex;gap:7px;margin-top:12px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;}
.act-btn{border:none;padding:7px 15px;border-radius:5px;cursor:pointer;font-family:var(--fb);font-size:12px;font-weight:600;}
.act-btn:active{filter:brightness(.85);}
.act-gold{background:var(--gold);color:#FFF9EE;}
.act-red{background:var(--red);color:#FFF9EE;}
.act-fav{background:rgba(255,249,238,.14);border:1px solid rgba(255,249,238,.28)!important;color:#FFF9EE;font-size:13px;}
.act-fav.on{color:#FFD700;}
.detail-body-inner{padding:18px 16px 36px;}
.detail-quote{font-style:italic;color:var(--muted);font-size:14px;line-height:1.75;margin-bottom:17px;background:rgba(200,168,122,.08);border-right:4px solid var(--light);padding:10px 12px;border-radius:0 6px 6px 0;}
.tags-row{margin-bottom:17px;}
.tag{display:inline-block;background:var(--light);border:1px solid var(--border);color:var(--brown);padding:2px 9px;border-radius:12px;font-size:11px;margin-left:5px;margin-bottom:4px;}
.section-title{font-family:var(--ff);font-size:14px;font-weight:700;color:var(--brown);border-bottom:2px solid var(--light);padding-bottom:6px;margin-bottom:11px;letter-spacing:.6px;display:flex;align-items:center;gap:6px;}
.ing-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--light);font-size:14px;color:var(--text);}
.ing-dot{color:var(--gold);font-size:11px;flex-shrink:0;}
.ing-amount{color:var(--gold);font-weight:700;}
.step-item{display:flex;gap:11px;margin-bottom:12px;align-items:flex-start;}
.step-num{background:var(--brown);color:#FFF9EE;width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;font-family:var(--ff);}
.step-text{font-size:14px;color:var(--text);line-height:1.7;flex:1;padding-top:3px;}
.detail-footer{text-align:center;color:var(--light);font-size:17px;margin-top:30px;letter-spacing:9px;}

/* ── SERVINGS ── */
.servings-bar{display:flex;align-items:center;gap:11px;background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:9px 13px;margin-bottom:18px;}
.servings-label{font-family:var(--ff);font-size:13px;color:var(--brown);font-weight:700;flex:1;}
.servings-count{font-family:var(--ff);font-size:20px;font-weight:900;color:var(--brown);min-width:30px;text-align:center;}
.srv-btn{width:33px;height:33px;border-radius:50%;background:var(--brown);color:#FFF9EE;border:none;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;line-height:1;}
.srv-btn:active{filter:brightness(.8);}
.srv-btn:disabled{background:var(--light);color:var(--border);cursor:default;}

/* ── TIMER BTN ── */
.timer-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(139,105,20,.1);border:1.5px solid var(--gold);color:var(--gold);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:var(--fb);margin-top:6px;}
.timer-btn:active{background:rgba(139,105,20,.22);}

/* ── TIMER OVERLAY ── */
.timer-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.83);display:none;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.timer-overlay.show{display:flex;}
.timer-box{background:linear-gradient(160deg,var(--dark),var(--brown));border:3px solid var(--gold);border-radius:22px;padding:32px 36px;text-align:center;width:86%;max-width:310px;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:modalIn .22s ease;}
.timer-step-lbl{font-size:11px;color:#C4A882;letter-spacing:2px;margin-bottom:9px;font-style:italic;}
.timer-progress{width:100%;height:5px;background:rgba(255,249,238,.15);border-radius:3px;margin-bottom:20px;overflow:hidden;}
.timer-progress-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .8s linear;}
.timer-display{font-family:var(--ff);font-size:68px;font-weight:900;color:#FFF9EE;letter-spacing:3px;line-height:1;text-shadow:0 0 30px rgba(139,105,20,.6);margin-bottom:22px;}
.timer-display.urgent{color:#E8774A;animation:timerPulse .6s ease infinite;}
.timer-btns{display:flex;gap:11px;justify-content:center;}
.timer-act{padding:11px 20px;border-radius:9px;border:none;font-family:var(--ff);font-size:14px;cursor:pointer;font-weight:700;letter-spacing:.3px;}
.timer-act:active{filter:brightness(.85);}
.timer-primary{background:var(--gold);color:#FFF9EE;}
.timer-secondary{background:rgba(255,249,238,.12);color:#FFF9EE;border:1px solid rgba(255,249,238,.3)!important;}

/* ── FORM ── */
.form-subhdr{display:flex;align-items:center;background:var(--dark);border-bottom:2px solid var(--gold);padding:0 12px;flex-shrink:0;}
.form-back{background:transparent;border:none;color:#C4A882;padding:11px 7px;cursor:pointer;font-family:var(--fb);font-size:12px;}
.form-back:active{color:#FFF9EE;}
.form-title-mid{flex:1;text-align:center;color:var(--gold);font-family:var(--ff);font-size:13px;}
.progress-wrap{background:var(--dark);padding:9px 13px 11px;flex-shrink:0;}
.progress-bars{display:flex;gap:4px;}
.progress-bar{flex:1;height:4px;border-radius:2px;background:rgba(122,92,58,.35);transition:background .35s;}
.progress-bar.done{background:var(--gold);}
.progress-labels{display:flex;justify-content:space-between;margin-top:4px;}
.progress-lbl{font-size:10px;color:var(--muted);font-style:italic;transition:color .3s;}
.progress-lbl.active{color:var(--gold);}
.form-body{padding:16px 16px 48px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--brown);margin-bottom:4px;font-weight:700;letter-spacing:.4px;font-family:var(--ff);}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;background:var(--cream);border:1.5px solid var(--border);border-radius:6px;font-family:var(--fb);font-size:14px;color:var(--text);direction:rtl;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);}
.field textarea{min-height:66px;resize:vertical;}
.row2{display:flex;gap:9px;}
.row2 .field{flex:1;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:7px;}
.emoji-btn{font-size:22px;background:transparent;border:2px solid transparent;border-radius:6px;padding:4px;cursor:pointer;}
.emoji-btn.sel{background:var(--light);border-color:var(--gold);}
.emoji-btn:active{transform:scale(.88);}

/* Photo picker */
.photo-options{display:flex;gap:9px;margin-top:7px;}
.photo-opt-btn{flex:1;padding:11px 8px;background:var(--cream);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-family:var(--fb);font-size:13px;color:var(--brown);text-align:center;transition:all .2s;}
.photo-opt-btn:active{border-color:var(--gold);background:var(--light);}
.upload-zone{border:2px dashed var(--border);border-radius:9px;padding:18px;text-align:center;cursor:pointer;background:rgba(139,105,20,.03);margin-top:5px;}
.upload-zone.has-img{padding:5px;border-style:solid;border-color:var(--gold);}
.upload-zone:active{border-color:var(--gold);}
.upload-preview{width:100%;height:145px;object-fit:cover;border-radius:7px;display:block;}
.upload-icon{font-size:28px;margin-bottom:5px;}
.upload-text{font-size:13px;color:var(--muted);}
.upload-sub{font-size:11px;color:var(--light);margin-top:2px;}
.remove-img-btn{background:transparent;border:1.5px solid var(--red);color:var(--red);border-radius:5px;padding:6px;cursor:pointer;font-family:var(--fb);font-size:12px;width:100%;margin-top:5px;}
.remove-img-btn:active{background:rgba(139,58,58,.08);}

/* Ingredient / step rows */
.dyn-row{display:flex;gap:7px;margin-bottom:7px;}
.ing-field-wrap{flex:1;position:relative;}/* for autocomplete */
.dyn-input{width:100%;padding:9px 11px;background:var(--cream);border:1.5px solid var(--border);border-radius:6px;font-family:var(--fb);font-size:14px;color:var(--text);direction:rtl;}
.dyn-input:focus{outline:none;border-color:var(--gold);}
.dyn-textarea{flex:1;padding:9px 11px;background:var(--cream);border:1.5px solid var(--border);border-radius:6px;font-family:var(--fb);font-size:14px;color:var(--text);direction:rtl;min-height:52px;resize:vertical;}
.dyn-textarea:focus{outline:none;border-color:var(--gold);}
.remove-field-btn{background:var(--red);color:#FFF9EE;border:none;border-radius:5px;padding:0 10px;cursor:pointer;font-size:18px;flex-shrink:0;align-self:stretch;display:flex;align-items:center;}
.remove-field-btn:active{filter:brightness(.85);}
.add-more-btn{background:transparent;border:1.5px dashed var(--border);color:var(--muted);border-radius:5px;padding:8px;cursor:pointer;font-family:var(--fb);font-size:13px;width:100%;margin-top:3px;}
.add-more-btn:active{border-color:var(--gold);color:var(--brown);}
.step-label{font-size:11px;color:var(--gold);margin-bottom:4px;font-family:var(--ff);}

/* Autocomplete dropdown */
.ac-dropdown{position:absolute;top:100%;right:0;left:0;background:var(--cream);border:1.5px solid var(--gold);border-top:none;border-radius:0 0 8px 8px;box-shadow:0 8px 20px rgba(0,0,0,.15);z-index:200;max-height:170px;overflow-y:auto;}
.ac-item{padding:10px 12px;font-size:14px;color:var(--text);cursor:pointer;font-family:var(--fb);direction:rtl;border-bottom:1px solid var(--light);}
.ac-item:last-child{border-bottom:none;}
.ac-item:active,.ac-item.hov{background:var(--light);}
.ac-match{color:var(--gold);font-weight:700;}

.btn-gold{background:linear-gradient(170deg,var(--brown),var(--dark));color:#FFF9EE;border:2px solid var(--gold);border-radius:7px;padding:12px;cursor:pointer;font-family:var(--ff);font-size:15px;letter-spacing:1px;box-shadow:0 3px 10px rgba(0,0,0,.2);width:100%;margin-top:7px;}
.btn-gold:active{filter:brightness(.88);}
.btn-gold:disabled{opacity:.45;cursor:default;}
.btn-gray{background:var(--light);color:var(--brown);border:1.5px solid var(--border);border-radius:7px;padding:12px;cursor:pointer;font-family:var(--ff);font-size:14px;}
.btn-gray:active{filter:brightness(.9);}
.btn-row{display:flex;gap:9px;margin-top:14px;}
.btn-row .btn-gray{flex:1;}
.btn-row .btn-gold{flex:2;margin-top:0;}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:300;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px);}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--cream);border-radius:14px;padding:22px;width:100%;max-width:340px;border:2px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.4);animation:modalIn .22s ease;max-height:82vh;overflow-y:auto;}
.modal-title{font-family:var(--ff);font-size:17px;font-weight:700;color:var(--brown);text-align:center;margin-bottom:9px;}
.modal-text{font-size:14px;color:var(--muted);text-align:center;margin-bottom:19px;line-height:1.6;}
.modal-btns{display:flex;gap:9px;}
.modal-cancel{flex:1;padding:11px;background:var(--light);border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-family:var(--fb);font-size:14px;color:var(--brown);}
.modal-confirm{flex:1;padding:11px;background:var(--red);border:none;border-radius:7px;cursor:pointer;font-family:var(--fb);font-size:14px;color:#FFF9EE;font-weight:600;}
.modal-cancel:active,.modal-confirm:active{filter:brightness(.88);}
.cat-row{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px dashed var(--light);}
.cat-row-icon{font-size:17px;}
.cat-row-name{flex:1;font-size:14px;color:var(--text);font-family:var(--fb);}
.cat-edit-inp{flex:1;padding:5px 8px;background:var(--cream);border:1.5px solid var(--gold);border-radius:4px;font-family:var(--fb);font-size:13px;color:var(--text);direction:rtl;}
.cat-edit-inp:focus{outline:none;}
.cat-actions{display:flex;gap:4px;}
.cat-act-btn{background:transparent;border:1px solid var(--border);border-radius:4px;padding:5px 8px;cursor:pointer;font-size:12px;color:var(--brown);}
.cat-act-btn.red{border-color:var(--red);color:var(--red);}
.cat-act-btn.gold{background:var(--gold);border-color:var(--gold);color:#FFF9EE;}
.cat-act-btn.gray{background:var(--light);}
.cat-act-btn:active{filter:brightness(.88);}
.new-cat-row{display:flex;gap:7px;margin-top:13px;}
.new-cat-inp{flex:1;padding:9px 11px;background:var(--cream);border:1.5px solid var(--border);border-radius:6px;font-family:var(--fb);font-size:14px;color:var(--text);direction:rtl;}
.new-cat-inp:focus{outline:none;border-color:var(--gold);}
.new-cat-add{background:var(--gold);border:none;color:#FFF9EE;border-radius:6px;padding:0 15px;cursor:pointer;font-size:22px;flex-shrink:0;}
.new-cat-add:active{filter:brightness(.88);}

@keyframes fadeSlide{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.55}}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="page-home" class="page active">

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════════
const CAT_COLORS={'אפייה':'#7C5C2C','מרקים':'#4A7C4E','קינוחים':'#8B3A3A','עיקריות':'#5A3E28','שימורים':'#3D6B45','סלטים':'#5B7A3D','ללא גלוטן':'#6B4E8B'};
const CAT_ICONS={'אפייה':'🍞','מרקים':'🍲','קינוחים':'🍰','עיקריות':'🍽️','שימורים':'🫙','סלטים':'🥗','ללא גלוטן':'🌾'};
const EMOJIS=['🍽️','🍞','🥗','🍅','🥩','🍎','🍓','🥒','🥐','🍜','🥘','🫕','🍲','🧁','🍰','🫙','🧆','🥚','🧅','🫑','🥦','🫐','🍋','🧄','🫒','🌽','🥕','🍄'];
const DIFFS=['קל','בינוני','מורכב'];
const FORM_STEPS=['פרטים','מצרכים','הכנה'];
const DEFAULT_CATS=['אפייה','מרקים','קינוחים','עיקריות','שימורים','סלטים','ללא גלוטן'];

// ══════════════════════════════════════════════════════════════
//  PERSISTENT STORAGE  — migrates from all old keys automatically
// ══════════════════════════════════════════════════════════════
const LS_KEY = 'myRecipeBook';   // ← single permanent key, never changes again

function loadState() {
  try {
    // Migrate from any previous version's key (so no data is ever lost)
    const OLD_KEYS = ['recipeBook_v1','rb3','rb2','recipeBookState'];
    for (const k of OLD_KEYS) {
      const raw = localStorage.getItem(k);
      if (raw) {
        const parsed = JSON.parse(raw);
        OLD_KEYS.forEach(ok => localStorage.removeItem(ok));
        localStorage.setItem(LS_KEY, raw);
        return parsed;
      }
    }
    const saved = localStorage.getItem(LS_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  // Truly first launch — empty cookbook
  return { recipes: [], cats: DEFAULT_CATS };
}

function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({ recipes: S.recipes, cats: S.cats })); } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
const _loaded = loadState();
const S = {
  recipes:       _loaded.recipes,
  cats:          _loaded.cats,
  page:          'home',
  activeCat:     'הכל',
  favOnly:       false,
  detailId:      null,
  detailServings:null,
  editMode:      false,
  delTargetId:   null,
  editCatIdx:    null,
  formStep:      1,
  fd:            null,
};

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function g(id){ return document.getElementById(id); }
function cColor(c){ return CAT_COLORS[c]||'#7C5C2C'; }
function cIcon(c){ return CAT_ICONS[c]||'🍽️'; }
function fmtTime(s){
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

// ══════════════════════════════════════════════════════════════
//  AUTOCOMPLETE ENGINE
//  Builds a frequency map of full ingredient phrases across all recipes.
//  On each keystroke, suggests phrases that START WITH or CONTAIN the typed text,
//  ranked by how often they appear.
// ══════════════════════════════════════════════════════════════
function buildIngFreq() {
  const freq = {};
  S.recipes.forEach(r => {
    r.ingredients.forEach(ing => {
      const k = ing.trim();
      if (k.length > 1) freq[k] = (freq[k]||0) + 1;
    });
  });
  return freq;
}

function getACSuggestions(val) {
  const v = val.trim();
  if (v.length < 2) return [];
  const freq = buildIngFreq();
  return Object.entries(freq)
    .filter(([phrase]) => phrase !== v && phrase.includes(v))
    .sort((a, b) => {
      // Prefer phrases that START with the typed text
      const aStarts = a[0].startsWith(v) ? 1 : 0;
      const bStarts = b[0].startsWith(v) ? 1 : 0;
      if (bStarts !== aStarts) return bStarts - aStarts;
      return b[1] - a[1]; // then by frequency
    })
    .slice(0, 5)
    .map(([phrase]) => phrase);
}

let _acActiveIdx = -1;

function showACDropdown(wrapEl, inputEl, suggestions, onSelect) {
  removeACDropdown();
  if (!suggestions.length) return;
  _acActiveIdx = -1;
  const dd = document.createElement('div');
  dd.className = 'ac-dropdown';
  dd.id = 'ac-dd';
  suggestions.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'ac-item';
    // Highlight matched portion
    const v = inputEl.value.trim();
    const idx = s.indexOf(v);
    if (idx >= 0) {
      item.innerHTML = esc(s.slice(0,idx)) +
        '<span class="ac-match">'+esc(s.slice(idx,idx+v.length))+'</span>' +
        esc(s.slice(idx+v.length));
    } else { item.textContent = s; }
    item.addEventListener('mousedown', e => { e.preventDefault(); onSelect(s); removeACDropdown(); });
    item.addEventListener('touchstart', e => { e.preventDefault(); onSelect(s); removeACDropdown(); }, {passive:false});
    dd.appendChild(item);
  });
  wrapEl.appendChild(dd);

  // Keyboard navigation for the input
  inputEl._acKeyHandler = e => {
    const items = dd.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); _acActiveIdx=Math.min(_acActiveIdx+1,items.length-1); items.forEach((it,i)=>it.classList.toggle('hov',i===_acActiveIdx)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); _acActiveIdx=Math.max(_acActiveIdx-1,0); items.forEach((it,i)=>it.classList.toggle('hov',i===_acActiveIdx)); }
    else if (e.key === 'Enter' && _acActiveIdx >= 0) { e.preventDefault(); onSelect(suggestions[_acActiveIdx]); removeACDropdown(); }
    else if (e.key === 'Escape') removeACDropdown();
  };
  inputEl.addEventListener('keydown', inputEl._acKeyHandler);
}

function removeACDropdown() {
  const d = g('ac-dd'); if (d) d.remove();
  // Clean up key handler from all inputs
  document.querySelectorAll('[data-ingidx]').forEach(inp => {
    if (inp._acKeyHandler) { inp.removeEventListener('keydown', inp._acKeyHandler); inp._acKeyHandler=null; }
  });
}

// ══════════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════════
function showPage(name) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); g('page-'+name).classList.add('active'); S.page=name; }
function goHome() { removeACDropdown(); showPage('home'); renderHome(); }

// ══════════════════════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════════════════════
function renderHome() {
  renderCatBar(); renderCards();
  g('hdr-count').textContent = S.recipes.length+' מתכונים · '+S.recipes.filter(r=>r.favorite).length+' מועדפים';
  g('btn-fav-toggle').classList.toggle('on', S.favOnly);
}

function renderCatBar() {
  const all = ['הכל', ...S.cats];
  g('cat-bar').innerHTML = all.map(cat => {
    const a = S.activeCat===cat;
    const bg = a ? cColor(cat) : '';
    const style = a ? ` style="background:${bg};border-color:${bg};color:#FFF9EE;font-weight:600"` : '';
    return `<button class="cat-pill${a?' active':''}"${style} data-setcat="${esc(cat)}">${cat!=='הכל'?cIcon(cat)+' ':''}${esc(cat)}</button>`;
  }).join('') + '<button class="cat-manage-pill" data-opencats="1">+ ניהול</button>';
}

function renderCards() {
  const q = g('search-input').value.toLowerCase().trim();
  const list = S.recipes.filter(r => {
    if (S.favOnly && !r.favorite) return false;
    if (S.activeCat!=='הכל' && r.category!==S.activeCat) return false;
    if (q) return r.title.toLowerCase().includes(q)||r.description.toLowerCase().includes(q)||r.tags.some(t=>t.toLowerCase().includes(q));
    return true;
  });
  g('filter-count').textContent = list.length+' מתכונים'+(S.favOnly?' מועדפים':'')+(S.activeCat!=='הכל'?' ב'+S.activeCat:'');
  if (!list.length) {
    const isFirst = S.recipes.length===0;
    g('cards-list').innerHTML = `<div class="empty-state"><div class="empty-icon">${isFirst?'📖':'📭'}</div><div style="font-style:italic">${isFirst?'הספר ריק עדיין':'לא נמצאו מתכונים'}</div>${isFirst?'<div class="empty-hint">לחץ ✏️ מתכון חדש כדי להתחיל</div>':''}</div>`;
    return;
  }
  g('cards-list').innerHTML = list.map((r,i) => {
    const cc=cColor(r.category), ci=cIcon(r.category);
    return `<div class="card" data-openid="${r.id}" style="animation-delay:${i*.04}s">
      ${r.image?`<img class="card-img" src="${esc(r.image)}" alt="">`:'' }
      <div class="card-accent" style="background:${cc}"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-emoji">${r.emoji}</span>
          <div class="card-info">
            <div class="card-title">${esc(r.title)}</div>
            <span class="card-cat-badge" style="background:${cc}">${ci} ${esc(r.category)}</span>
          </div>
          <button class="fav-star${r.favorite?' on':''}" data-favid="${r.id}">${r.favorite?'★':'☆'}</button>
        </div>
        <div class="card-desc">${esc(r.description)}</div>
        <div class="card-meta"><span>⏱ ${esc(r.time)}</span><span>👥 ${r.servings} מנות</span><span>📊 ${esc(r.difficulty)}</span></div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════
//  DETAIL
// ══════════════════════════════════════════════════════════════
function openDetail(id) { S.detailId=id; S.detailServings=null; renderDetail(); showPage('detail'); g('detail-scroll').scrollTop=0; }

function renderDetail() {
  const r = S.recipes.find(x=>x.id===S.detailId); if(!r) return;
  const srv = S.detailServings||r.servings;
  const ratio = srv/(r.servings||1);

  g('detail-hero').innerHTML = `
    <button class="back-btn" id="btn-det-back">← חזרה</button>
    ${r.image?`<img class="detail-img-hero" src="${esc(r.image)}" alt="">`:`<div class="detail-emoji">${r.emoji}</div>`}
    <div class="detail-title">${esc(r.title)}</div>
    <div class="detail-badges"><span class="badge">⏱ ${esc(r.time)}</span><span class="badge">📊 ${esc(r.difficulty)}</span></div>
    <div class="detail-actions">
      <button class="act-btn act-fav${r.favorite?' on':''}" id="btn-det-fav">${r.favorite?'★ מועדף':'☆ מועדף'}</button>
      <button class="act-btn act-gold" id="btn-det-edit">✏️ עריכה</button>
      <button class="act-btn act-red" id="btn-det-del">🗑 מחיקה</button>
    </div>`;

  g('btn-det-back').addEventListener('click', goHome);
  g('btn-det-fav').addEventListener('click', ()=>toggleFav(r.id));
  g('btn-det-edit').addEventListener('click', ()=>openEdit(r.id));
  g('btn-det-del').addEventListener('click', ()=>openDelModal(r.id));

  function scaleIng(raw) {
    if (ratio===1) return esc(raw);
    return esc(raw).replace(/(\d+(?:[.,]\d+)?(?:\/\d+)?)/g, match => {
      const parts = match.split('/');
      let n = parts.length===2 ? +parts[0]/+parts[1] : parseFloat(match.replace(',','.'));
      if (isNaN(n)) return match;
      const sc = n*ratio;
      if (Math.abs(sc-Math.round(sc))<.06) return `<span class="ing-amount">${Math.round(sc)}</span>`;
      if (Math.abs(sc-.25)<.06) return '<span class="ing-amount">¼</span>';
      if (Math.abs(sc-.5)<.06)  return '<span class="ing-amount">½</span>';
      if (Math.abs(sc-.75)<.06) return '<span class="ing-amount">¾</span>';
      if (Math.abs(sc-1.5)<.06) return '<span class="ing-amount">1½</span>';
      return `<span class="ing-amount">${(Math.round(sc*4)/4)}</span>`;
    });
  }
  function stepSecs(txt) {
    const m = txt.match(/(\d+)\s*(דקות?|שעות?|שעה|שניות?)/);
    if (!m) return 0;
    if (m[2].startsWith('שעה')||m[2].startsWith('שעות')) return +m[1]*3600;
    if (m[2].startsWith('שניות')||m[2].startsWith('שנייה')) return +m[1];
    return +m[1]*60;
  }

  const tags = r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const ings = r.ingredients.map(i=>`<div class="ing-item"><span class="ing-dot">✦</span><span>${scaleIng(i)}</span></div>`).join('');
  const steps = r.steps.map((s,i)=>{
    const secs=stepSecs(s);
    const tb=secs?`<br><button class="timer-btn" data-tsecs="${secs}" data-tstep="${i+1}">⏱ הפעל טיימר · ${fmtTime(secs)}</button>`:'';
    return `<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${esc(s)}${tb}</div></div>`;
  }).join('');

  g('detail-body').innerHTML = `<div class="detail-body-inner">
    <p class="detail-quote">${esc(r.description)}</p>
    ${tags?`<div class="tags-row">${tags}</div>`:''}
    <div class="section-title"><span>🌿</span> מצרכים</div>
    <div class="servings-bar">
      <span class="servings-label">👥 כמות מנות</span>
      <button class="srv-btn" id="btn-srv-minus" ${srv<=1?'disabled':''}>−</button>
      <span class="servings-count">${srv}</span>
      <button class="srv-btn" id="btn-srv-plus">+</button>
    </div>
    <div style="margin-bottom:20px">${ings}</div>
    <div class="section-title"><span>📋</span> אופן הכנה</div>
    ${steps}
    <div class="detail-footer">✦ ✦ ✦</div>
  </div>`;

  g('btn-srv-minus').addEventListener('click', ()=>changeServings(-1));
  g('btn-srv-plus').addEventListener('click',  ()=>changeServings(1));
  g('detail-body').querySelectorAll('.timer-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>openTimer(+btn.dataset.tsecs, +btn.dataset.tstep));
  });
}

function changeServings(d) {
  const r=S.recipes.find(x=>x.id===S.detailId); if(!r) return;
  S.detailServings = Math.max(1, (S.detailServings||r.servings)+d);
  const sy = g('detail-scroll').scrollTop;
  renderDetail();
  g('detail-scroll').scrollTop = sy;
}

function toggleFav(id) {
  S.recipes = S.recipes.map(r=>r.id===id?{...r,favorite:!r.favorite}:r);
  saveState(); renderCards();
  g('hdr-count').textContent = S.recipes.length+' מתכונים · '+S.recipes.filter(r=>r.favorite).length+' מועדפים';
  const btn=g('btn-det-fav');
  if (btn) { const r=S.recipes.find(x=>x.id===id); btn.textContent=r&&r.favorite?'★ מועדף':'☆ מועדף'; btn.classList.toggle('on',!!(r&&r.favorite)); }
}

// ══════════════════════════════════════════════════════════════
//  DELETE MODAL
// ══════════════════════════════════════════════════════════════
function openDelModal(id) { S.delTargetId=id; const r=S.recipes.find(x=>x.id===id); g('del-modal-text').innerHTML='האם למחוק את <strong>"'+esc(r.title)+'"</strong>?<br>פעולה זו אינה ניתנת לביטול.'; g('del-modal').classList.add('show'); }
function closeDelModal() { g('del-modal').classList.remove('show'); S.delTargetId=null; }
function confirmDelete() { S.recipes=S.recipes.filter(r=>r.id!==S.delTargetId); saveState(); closeDelModal(); goHome(); }

// ══════════════════════════════════════════════════════════════
//  CATEGORY MODAL
// ══════════════════════════════════════════════════════════════
function openCatModal() { S.editCatIdx=null; renderCatList(); g('cat-modal').classList.add('show'); }
function closeCatModal() { g('cat-modal').classList.remove('show'); S.editCatIdx=null; renderCatBar(); }

function renderCatList() {
  g('cat-modal-list').innerHTML = S.cats.map((cat,i)=>{
    if (S.editCatIdx===i) return `<div class="cat-row"><span class="cat-row-icon">${cIcon(cat)}</span><input class="cat-edit-inp" id="ceinp-${i}" value="${esc(cat)}" data-cidx="${i}"><div class="cat-actions"><button class="cat-act-btn gold" id="cesave-${i}">✓</button><button class="cat-act-btn gray" id="cecancel">✕</button></div></div>`;
    return `<div class="cat-row"><span class="cat-row-icon">${cIcon(cat)}</span><span class="cat-row-name">${esc(cat)}</span><div class="cat-actions"><button class="cat-act-btn" data-catedit="${i}">✏️</button><button class="cat-act-btn red" data-catdel="${i}">🗑</button></div></div>`;
  }).join('');
  g('cat-modal-list').querySelectorAll('[data-catedit]').forEach(b=>b.addEventListener('click',()=>{S.editCatIdx=+b.dataset.catedit;renderCatList();}));
  g('cat-modal-list').querySelectorAll('[data-catdel]').forEach(b=>b.addEventListener('click',()=>{const cat=S.cats[+b.dataset.catdel];S.cats.splice(+b.dataset.catdel,1);if(S.activeCat===cat)S.activeCat='הכל';saveState();renderCatList();}));
  if (S.editCatIdx!==null) {
    const idx=S.editCatIdx, inp=g('ceinp-'+idx), save=g('cesave-'+idx), cancel=g('cecancel');
    if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')saveCat(idx);if(e.key==='Escape'){S.editCatIdx=null;renderCatList();}});}
    if(save)save.addEventListener('click',()=>saveCat(idx));
    if(cancel)cancel.addEventListener('click',()=>{S.editCatIdx=null;renderCatList();});
  }
}
function saveCat(i) {
  const inp=g('ceinp-'+i); if(!inp||!inp.value.trim())return;
  const old=S.cats[i], nw=inp.value.trim();
  S.cats[i]=nw; S.recipes=S.recipes.map(r=>r.category===old?{...r,category:nw}:r);
  if(S.activeCat===old)S.activeCat=nw; saveState(); S.editCatIdx=null; renderCatList();
}
function addCategory() {
  const inp=g('new-cat-inp'), name=inp.value.trim();
  if(!name||S.cats.includes(name))return;
  S.cats.push(name); inp.value=''; saveState(); renderCatList();
}

// ══════════════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════════════
const T = { total:0, remaining:0, running:false, interval:null, step:0 };
function openTimer(secs,step) { clearInterval(T.interval);T.running=false;T.total=secs;T.remaining=secs;T.step=step;updateTimerUI();g('timer-overlay').classList.add('show'); }
function closeTimer() { clearInterval(T.interval);T.running=false;g('timer-overlay').classList.remove('show'); }
function toggleTimer() { T.running?pauseTimer():startTimer(); }
function startTimer() {
  if(T.remaining<=0)T.remaining=T.total;
  T.running=true; g('btn-timer-toggle').textContent='⏸ עצור';
  T.interval=setInterval(()=>{T.remaining--;updateTimerUI();if(T.remaining<=0){clearInterval(T.interval);T.running=false;timerDone();}},1000);
}
function pauseTimer() { clearInterval(T.interval);T.running=false;g('btn-timer-toggle').textContent=T.remaining<T.total?'▶ המשך':'▶ התחל'; }
function timerDone() {
  g('timer-display').textContent='✓ סיום!'; g('timer-display').classList.add('urgent'); g('btn-timer-toggle').textContent='🔄 שוב';
  if(navigator.vibrate)navigator.vibrate([400,200,400,200,400]);
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,.35,.7].forEach(t=>{const o=ctx.createOscillator(),gn=ctx.createGain();o.connect(gn);gn.connect(ctx.destination);o.frequency.value=880;gn.gain.setValueAtTime(.4,ctx.currentTime+t);gn.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.28);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.3);});}catch(e){}
}
function updateTimerUI() {
  const d=g('timer-display'),f=g('timer-fill'),l=g('timer-step-lbl'),b=g('btn-timer-toggle');
  if(!d)return;
  d.textContent=fmtTime(T.remaining); d.classList.toggle('urgent',T.remaining<=10&&T.running);
  if(f)f.style.width=(T.total>0?T.remaining/T.total*100:100)+'%';
  if(l)l.textContent='⏱ שלב '+T.step;
  if(b&&T.remaining>0)b.textContent=T.running?'⏸ עצור':(T.remaining<T.total?'▶ המשך':'▶ התחל');
}

// ══════════════════════════════════════════════════════════════
//  IMAGE HELPER
// ══════════════════════════════════════════════════════════════
function loadImageFile(file, cb) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => cb(ev.target.result);
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════════════════════════
//  FORM
// ══════════════════════════════════════════════════════════════
function emptyFd() { return {id:null,title:'',category:S.cats[0]||'עיקריות',description:'',time:'',servings:'',difficulty:'קל',ingredients:[''],steps:[''],tags:'',emoji:'🍽️',image:null,favorite:false}; }
function openAdd() { removeACDropdown();S.editMode=false;S.fd=emptyFd();S.formStep=1;renderForm();showPage('form');g('form-scroll').scrollTop=0; }
function openEdit(id) { removeACDropdown();const r=S.recipes.find(x=>x.id===id);if(!r)return;S.editMode=true;S.fd={...r,tags:r.tags.join(', '),ingredients:[...r.ingredients],steps:[...r.steps]};S.formStep=1;renderForm();showPage('form');g('form-scroll').scrollTop=0; }

function renderForm() {
  g('form-title-mid').textContent = S.editMode?'✏️ עריכת מתכון':'✨ מתכון חדש';
  g('progress-bars').innerHTML = FORM_STEPS.map((_,i)=>`<div class="progress-bar${S.formStep>i?' done':''}"></div>`).join('');
  g('progress-labels').innerHTML = FORM_STEPS.map((s,i)=>`<div class="progress-lbl${S.formStep===i+1?' active':''}">${s}</div>`).join('');
  const body = g('form-body');
  removeACDropdown();
  if (S.formStep===1) buildStep1(body);
  else if (S.formStep===2) buildStep2(body);
  else buildStep3(body);
  g('form-scroll').scrollTop=0;
}

// ── STEP 1: Basic info + photo ──────────────────────────────
function buildStep1(body) {
  const fd = S.fd;
  body.innerHTML = `
    <div class="field"><label>אימוג'י מייצג</label>
      <div class="emoji-grid" id="egrid">${EMOJIS.map(e=>`<button class="emoji-btn${fd.emoji===e?' sel':''}" data-emojival="${e}">${e}</button>`).join('')}</div>
    </div>
    <div class="field"><label>תמונת מתכון 📸</label>
      ${fd.image
        ? `<div class="upload-zone has-img" id="upload-preview-zone"><img class="upload-preview" src="${esc(fd.image)}" alt=""></div>
           <button class="remove-img-btn" id="btn-rm-img">✕ הסר תמונה</button>`
        : `<div class="photo-options">
             <button class="photo-opt-btn" id="btn-photo-gallery">🖼️ בחר מהגלריה</button>
             <button class="photo-opt-btn" id="btn-photo-camera">📷 צלם עכשיו</button>
           </div>`
      }
    </div>
    <div class="field"><label>שם המתכון *</label><input id="f-title" value="${esc(fd.title)}" placeholder="למשל: עוגת גבינה של סבתא"></div>
    <div class="field"><label>קטגוריה</label><select id="f-cat">${S.cats.map(c=>`<option value="${esc(c)}"${fd.category===c?' selected':''}>${esc(c)}</option>`).join('')}</select></div>
    <div class="row2">
      <div class="field"><label>זמן הכנה</label><input id="f-time" value="${esc(fd.time)}" placeholder="45 דקות"></div>
      <div class="field"><label>מנות</label><input id="f-srv" type="number" value="${esc(fd.servings)}" placeholder="4"></div>
    </div>
    <div class="field"><label>רמת קושי</label><select id="f-diff">${DIFFS.map(d=>`<option${fd.difficulty===d?' selected':''}>${d}</option>`).join('')}</select></div>
    <div class="field"><label>תיאור קצר</label><textarea id="f-desc" placeholder="תיאור מפתה...">${esc(fd.description)}</textarea></div>
    <div class="field"><label>תגיות (מופרדות בפסיק)</label><input id="f-tags" value="${esc(fd.tags)}" placeholder="קיץ, כפרי, מסורתי"></div>
    <button class="btn-gold" id="btn-s1next" ${!fd.title.trim()?'disabled':''}>הבא ←</button>`;

  // Emoji
  body.querySelectorAll('[data-emojival]').forEach(b=>b.addEventListener('click',()=>{S.fd.emoji=b.dataset.emojival;renderForm();}));
  // Photo buttons
  const gal=g('btn-photo-gallery'), cam=g('btn-photo-camera'), rm=g('btn-rm-img');
  if(gal) gal.addEventListener('click',()=>g('input-gallery').click());
  if(cam) cam.addEventListener('click',()=>g('input-camera').click());
  if(rm)  rm.addEventListener('click',()=>{S.fd.image=null;renderForm();});
  // Inputs
  g('f-title').addEventListener('input',e=>{S.fd.title=e.target.value;g('btn-s1next').disabled=!e.target.value.trim();});
  g('f-cat').addEventListener('change',e=>S.fd.category=e.target.value);
  g('f-time').addEventListener('input',e=>S.fd.time=e.target.value);
  g('f-srv').addEventListener('input',e=>S.fd.servings=e.target.value);
  g('f-diff').addEventListener('change',e=>S.fd.difficulty=e.target.value);
  g('f-desc').addEventListener('input',e=>S.fd.description=e.target.value);
  g('f-tags').addEventListener('input',e=>S.fd.tags=e.target.value);
  g('btn-s1next').addEventListener('click',()=>{S.formStep=2;renderForm();});
}

// ── STEP 2: Ingredients + autocomplete ──────────────────────
function buildStep2(body) {
  const fd = S.fd;

  function ingHTML() {
    return fd.ingredients.map((v,i)=>`
      <div class="dyn-row">
        <div class="ing-field-wrap">
          <input class="dyn-input" data-ingidx="${i}" value="${esc(v)}" placeholder="מצרך ${i+1}..." autocomplete="off">
        </div>
        ${fd.ingredients.length>1?`<button class="remove-field-btn" data-rming="${i}">−</button>`:''}
      </div>`).join('');
  }

  body.innerHTML = `<div id="ing-wrap">${ingHTML()}</div>
    <button class="add-more-btn" id="btn-add-ing">+ הוסף מצרך</button>
    <div class="btn-row">
      <button class="btn-gray" id="btn-s2back">← חזרה</button>
      <button class="btn-gold" id="btn-s2next" ${!fd.ingredients.some(v=>v.trim())?'disabled':''}>הבא ←</button>
    </div>`;

  function wireIngs() {
    body.querySelectorAll('[data-ingidx]').forEach(inp => {
      inp.addEventListener('input', e => {
        const idx = +inp.dataset.ingidx;
        S.fd.ingredients[idx] = e.target.value;
        g('btn-s2next').disabled = !S.fd.ingredients.some(v=>v.trim());
        // Autocomplete
        const suggestions = getACSuggestions(e.target.value);
        const wrap = inp.closest('.ing-field-wrap');
        if (suggestions.length && wrap) {
          showACDropdown(wrap, inp, suggestions, chosen => {
            S.fd.ingredients[idx] = chosen;
            inp.value = chosen;
            g('btn-s2next').disabled = false;
          });
        } else { removeACDropdown(); }
      });
      inp.addEventListener('blur', ()=>setTimeout(removeACDropdown, 150));
    });
    body.querySelectorAll('[data-rming]').forEach(btn=>{
      btn.addEventListener('click',()=>{removeACDropdown();S.fd.ingredients.splice(+btn.dataset.rming,1);g('ing-wrap').innerHTML=ingHTML();wireIngs();});
    });
  }
  wireIngs();

  g('btn-add-ing').addEventListener('click',()=>{
    removeACDropdown();S.fd.ingredients.push('');g('ing-wrap').innerHTML=ingHTML();wireIngs();
    setTimeout(()=>{const all=body.querySelectorAll('[data-ingidx]');if(all.length)all[all.length-1].focus();},30);
  });
  g('btn-s2back').addEventListener('click',()=>{removeACDropdown();S.formStep=1;renderForm();});
  g('btn-s2next').addEventListener('click',()=>{removeACDropdown();S.formStep=3;renderForm();});
}

// ── STEP 3: Steps ───────────────────────────────────────────
function buildStep3(body) {
  const fd = S.fd;
  function stpHTML() {
    return fd.steps.map((v,i)=>`
      <div style="margin-bottom:12px">
        <div class="step-label">שלב ${i+1}</div>
        <div class="dyn-row">
          <textarea class="dyn-textarea" data-stepidx="${i}" placeholder="תאר את שלב ${i+1}...">${esc(v)}</textarea>
          ${fd.steps.length>1?`<button class="remove-field-btn" data-rmstep="${i}">−</button>`:''}
        </div>
      </div>`).join('');
  }
  body.innerHTML = `<div id="stp-wrap">${stpHTML()}</div>
    <button class="add-more-btn" id="btn-add-stp">+ הוסף שלב</button>
    <div class="btn-row">
      <button class="btn-gray" id="btn-s3back">← חזרה</button>
      <button class="btn-gold" id="btn-save" ${!fd.steps.some(v=>v.trim())?'disabled':''}>${S.editMode?'💾 שמור שינויים':'✨ הוסף מתכון'}</button>
    </div>`;

  function wireStps() {
    body.querySelectorAll('[data-stepidx]').forEach(ta=>{
      ta.addEventListener('input',e=>{S.fd.steps[+ta.dataset.stepidx]=e.target.value;g('btn-save').disabled=!S.fd.steps.some(v=>v.trim());});
    });
    body.querySelectorAll('[data-rmstep]').forEach(btn=>{
      btn.addEventListener('click',()=>{S.fd.steps.splice(+btn.dataset.rmstep,1);g('stp-wrap').innerHTML=stpHTML();wireStps();});
    });
  }
  wireStps();
  g('btn-add-stp').addEventListener('click',()=>{S.fd.steps.push('');g('stp-wrap').innerHTML=stpHTML();wireStps();setTimeout(()=>{const all=body.querySelectorAll('[data-stepidx]');if(all.length)all[all.length-1].focus();},30);});
  g('btn-s3back').addEventListener('click',()=>{S.formStep=2;renderForm();});
  g('btn-save').addEventListener('click',saveRecipe);
}

function saveRecipe() {
  const fd=S.fd;
  const r={...fd,id:S.editMode?fd.id:Date.now(),tags:fd.tags.split(',').map(t=>t.trim()).filter(Boolean),servings:parseInt(fd.servings)||4,ingredients:fd.ingredients.filter(v=>v.trim()),steps:fd.steps.filter(v=>v.trim()),favorite:S.editMode?fd.favorite:false};
  if(S.editMode){S.recipes=S.recipes.map(x=>x.id===r.id?r:x);saveState();openDetail(r.id);}
  else{S.recipes.unshift(r);saveState();goHome();}
}

// ══════════════════════════════════════════════════════════════
//  GLOBAL WIRING  (once at startup, never inline onclick)
// ══════════════════════════════════════════════════════════════
g('btn-nav-home').addEventListener('click', goHome);
g('btn-nav-add').addEventListener('click', openAdd);
g('btn-nav-cats').addEventListener('click', openCatModal);
g('search-input').addEventListener('input', renderCards);
g('btn-fav-toggle').addEventListener('click', ()=>{ S.favOnly=!S.favOnly; g('btn-fav-toggle').classList.toggle('on',S.favOnly); renderCards(); });

// Cat bar (delegated — re-rendered)
g('cat-bar').addEventListener('click', e=>{
  const pill=e.target.closest('[data-setcat]');
  if(pill){S.activeCat=pill.dataset.setcat;renderCatBar();renderCards();return;}
  if(e.target.closest('[data-opencats]'))openCatModal();
});

// Cards (delegated)
g('cards-list').addEventListener('click', e=>{
  const fav=e.target.closest('[data-favid]');
  if(fav){e.stopPropagation();toggleFav(+fav.dataset.favid);return;}
  const card=e.target.closest('[data-openid]');
  if(card)openDetail(+card.dataset.openid);
});

// Delete modal
g('btn-del-cancel').addEventListener('click', closeDelModal);
g('btn-del-confirm').addEventListener('click', confirmDelete);
g('del-modal').addEventListener('click', e=>{ if(e.target===g('del-modal'))closeDelModal(); });

// Category modal
g('btn-cat-close').addEventListener('click', closeCatModal);
g('cat-modal').addEventListener('click', e=>{ if(e.target===g('cat-modal'))closeCatModal(); });
g('btn-new-cat-add').addEventListener('click', addCategory);
g('new-cat-inp').addEventListener('keydown', e=>{ if(e.key==='Enter')addCategory(); });

// Timer
g('btn-timer-close').addEventListener('click', closeTimer);
g('btn-timer-toggle').addEventListener('click', toggleTimer);
g('timer-overlay').addEventListener('click', e=>{ if(e.target===g('timer-overlay'))closeTimer(); });

// Form back
g('btn-form-back').addEventListener('click', ()=>{ removeACDropdown(); if(S.editMode)openDetail(S.fd.id);else goHome(); });

// Image inputs (gallery + camera — both use same handler)
function handleImageInput(e) {
  loadImageFile(e.target.files[0], data=>{ S.fd.image=data; renderForm(); });
  e.target.value='';
}
g('input-gallery').addEventListener('change', handleImageInput);
g('input-camera').addEventListener('change', handleImageInput);

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
renderHome();
</script>
</body>
</html>
